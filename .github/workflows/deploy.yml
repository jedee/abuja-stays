name: Build and Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Remove stale dist
        run: rm -rf dist .vite node_modules/.vite
      - name: Install and build
        run: bun install && bun run build
      - name: Verify build
        run: |
          echo "=== dist contents ===" && ls dist/
          echo "=== index.html first 3 lines ===" && head -3 dist/index.html
          echo "=== asset count ===" && ls dist/assets/ | wc -l
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
